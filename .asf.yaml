# options are described here: https://github.com/apache/infrastructure-asfyaml?tab=readme-ov-file#repository-features

github:
  features:
    issues: true
  rulesets:
    - name: "Default Branch Protection"
      type: branch
      branches:
        includes:
          - "~DEFAULT_BRANCH"
          - "release/*"
          - "rel/*"
        excludes: []
      bypass_teams:
        - root
      restrict_deletion: true
      restrict_force_push: true
